<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Employee Settings &amp; Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            min-height: max(884px, 100dvh);
        }
        .ios-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background-color: #334155;
            border-radius: 12px;
            transition: background-color 0.2s;
        }
        .ios-toggle-active {
            background-color: #135bec;
        }
        .ios-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .ios-thumb-active {
            transform: translateX(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-white antialiased">
<div class="relative flex min-h-screen w-full flex-col max-w-[430px] mx-auto bg-background-dark overflow-x-hidden">
<header class="sticky top-0 z-20 bg-background-dark/80 backdrop-blur-md border-b border-white/5">
<div class="flex items-center p-4 justify-center">
<h2 class="text-white text-lg font-semibold leading-tight tracking-tight">Settings &amp; Profile</h2>
</div>
</header>
<main class="flex-1 px-4 py-8 space-y-8 pb-32">
<div class="flex flex-col items-center text-center">
<div class="relative mb-4">
<div class="size-24 rounded-full bg-primary/20 border-2 border-primary/30 flex items-center justify-center overflow-hidden">
<span class="material-symbols-outlined text-5xl text-primary">account_circle</span>
</div>
<button class="absolute bottom-0 right-0 size-8 bg-primary rounded-full border-2 border-background-dark flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-white">edit</span>
</button>
</div>
<h1 class="text-xl font-bold text-white">Alex Johnson</h1>
<p class="text-sm text-[#92a4c9] font-medium">Senior Technician</p>
</div>
<section class="space-y-3">
<h3 class="text-[#92a4c9] text-xs font-bold uppercase tracking-widest px-1">Profile Details</h3>
<div class="bg-[#192233] rounded-2xl border border-white/5 overflow-hidden">
<div class="flex items-center justify-between p-4 border-b border-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">mail</span>
<span class="text-sm font-medium">Email</span>
</div>
<span class="text-sm text-white/60">a.johnson@company.com</span>
</div>
<div class="flex items-center justify-between p-4 border-b border-white/5">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">call</span>
<span class="text-sm font-medium">Phone Number</span>
</div>
<span class="text-sm text-white/60">+1 (555) 012-3456</span>
</div>
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">badge</span>
<span class="text-sm font-medium">Employee ID</span>
</div>
<span class="text-sm text-white/60">EMP-29482</span>
</div>
</div>
</section>
<section class="space-y-3">
<h3 class="text-[#92a4c9] text-xs font-bold uppercase tracking-widest px-1">Preferences</h3>
<div class="bg-[#192233] rounded-2xl border border-white/5 overflow-hidden">
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">dark_mode</span>
<span class="text-sm font-medium">Dark Mode</span>
</div>
<div class="ios-toggle ios-toggle-active">
<div class="ios-thumb ios-thumb-active"></div>
</div>
</div>
</div>
</section>
<section class="space-y-3">
<h3 class="text-[#92a4c9] text-xs font-bold uppercase tracking-widest px-1">Account</h3>
<div class="bg-[#192233] rounded-2xl border border-white/5 overflow-hidden">
<div class="flex items-center justify-between p-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">policy</span>
<span class="text-sm font-medium">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-white/30 text-xl">chevron_right</span>
</div>
</div>
</section>
<div class="pt-4">
<button class="w-full flex items-center justify-center gap-2 p-4 bg-red-500/10 rounded-2xl border border-red-500/20 text-red-500 font-bold active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">logout</span>
<span>Log Out</span>
</button>
</div>
</main>
<nav class="fixed bottom-0 left-0 right-0 z-30 max-w-[430px] mx-auto bg-background-dark/90 backdrop-blur-xl border-t border-white/5 px-6 pb-8 pt-3">
<div class="flex items-center justify-between">
<button class="flex flex-col items-center gap-1 text-[#92a4c9]">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px] font-medium">Dashboard</span>
</button>
<button class="flex flex-col items-center gap-1 text-[#92a4c9]">
<span class="material-symbols-outlined">history</span>
<span class="text-[10px] font-medium">History</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">settings</span>
<span class="text-[10px] font-bold">Settings</span>
</button>
</div>
</nav>
</div>

</body></html>
