<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Updated Session Details Form</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .ios-dropdown-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white min-h-screen flex flex-col font-display">
<header class="sticky top-0 z-10 flex items-center bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-b border-white/10">
<div class="text-white flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios</span>
</div>
<h2 class="text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Session Details</h2>
</header>
<main class="flex-1 overflow-y-auto pb-48">
<div class="px-4 pt-6 pb-2">
<label class="block mb-2 text-xs font-semibold uppercase tracking-widest text-white/50">Client</label>
<button class="flex w-full items-center justify-between rounded-xl px-4 h-14 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
<span class="text-white font-medium text-base">Acme Corp - North Branch</span>
<span class="material-symbols-outlined text-white/40 ios-dropdown-icon">expand_more</span>
</button>
</div>
<div class="px-4 py-6 flex flex-col items-center">
<p class="text-white/60 text-xs font-semibold uppercase tracking-widest mb-4">Elapsed Time</p>
<div class="flex gap-4 w-full max-w-sm">
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-16 grow items-center justify-center rounded-xl px-3 bg-white/5 border border-white/10">
<p class="text-white text-3xl font-bold leading-tight tracking-tighter">02</p>
</div>
<div class="flex items-center justify-center">
<p class="text-white/50 text-xs font-medium uppercase">Hours</p>
</div>
</div>
<div class="flex items-center pt-2">
<span class="text-2xl font-bold text-white/30">:</span>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-16 grow items-center justify-center rounded-xl px-3 bg-white/5 border border-white/10">
<p class="text-white text-3xl font-bold leading-tight tracking-tighter">42</p>
</div>
<div class="flex items-center justify-center">
<p class="text-white/50 text-xs font-medium uppercase">Minutes</p>
</div>
</div>
<div class="flex items-center pt-2">
<span class="text-2xl font-bold text-white/30">:</span>
</div>
<div class="flex grow basis-0 flex-col items-stretch gap-2">
<div class="flex h-16 grow items-center justify-center rounded-xl px-3 bg-white/5 border border-white/10">
<p class="text-white text-3xl font-bold leading-tight tracking-tighter">15</p>
</div>
<div class="flex items-center justify-center">
<p class="text-white/50 text-xs font-medium uppercase">Seconds</p>
</div>
</div>
</div>
</div>
<div class="px-4 py-3">
<label class="block mb-2 text-xs font-semibold uppercase tracking-widest text-white/50">Service Type</label>
<button class="flex w-full items-center justify-between rounded-xl px-4 h-14 bg-white/5 border border-white/10 hover:bg-white/10 transition-colors">
<span class="text-white font-medium text-base">Maintenance</span>
<span class="material-symbols-outlined text-white/40 ios-dropdown-icon">expand_more</span>
</button>
</div>
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-white text-base font-semibold leading-normal pb-3">Session Summary</p>
<textarea class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/10 bg-white/5 placeholder:text-white/30 p-4 text-base font-normal leading-relaxed min-h-[140px]" placeholder="Enter work details, progress updates, and field notes here..."></textarea>
</label>
</div>
<div class="px-4 py-3">
<p class="text-white text-base font-semibold leading-normal pb-3">Documents</p>
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-4 bg-primary/10 border border-primary/20 text-primary gap-3 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">attachment</span>
<span class="text-base font-bold leading-normal tracking-tight">Add a Document</span>
</button>
<div class="mt-4 space-y-2">
<div class="flex items-center justify-between bg-white/5 border border-white/10 p-3 rounded-xl">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white/40">description</span>
<div class="flex flex-col">
<span class="text-sm font-medium">site_assessment.pdf</span>
<span class="text-xs text-white/30">1.2 MB</span>
</div>
</div>
<button class="text-white/40 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<div class="flex items-center justify-between bg-white/5 border border-white/10 p-3 rounded-xl">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white/40">image</span>
<div class="flex flex-col">
<span class="text-sm font-medium">service_photo_01.jpg</span>
<span class="text-xs text-white/30">4.5 MB</span>
</div>
</div>
<button class="text-white/40 hover:text-red-400 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 right-0 z-20">
<div class="bg-background-light dark:bg-background-dark/80 backdrop-blur-md px-4 pt-4 pb-2">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-4 bg-primary text-white shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all">
<span class="text-lg font-bold leading-normal tracking-tight">Save</span>
</button>
</div>
<nav class="bg-background-light dark:bg-background-dark/95 backdrop-blur-md border-t border-white/10 flex justify-around items-center pt-2 pb-6 px-4">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-[24px]">dashboard</span>
<span class="text-[10px] font-medium">Dashboard</span>
</a>
<a class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">history</span>
<span class="text-[10px] font-medium">History</span>
</a>
<a class="flex flex-col items-center gap-1 text-white/40 hover:text-white transition-colors" href="#">
<span class="material-symbols-outlined text-[24px]">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</a>
</nav>
</div>

</body></html>
